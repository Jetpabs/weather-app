<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Simple Weather App</h1>
        <h2>Welcome to the Weather App! Here you can check the current weather conditions in various cities.</h2>

        <div id="input-container">
            <input type="text" id="city-input" placeholder="Enter city name">
            <button id="fetch-button">Search</button>
        </div>

        <div id="weather-container" class="hidden">
            <article class="weather-output" id="weather-past">
                <h3 class="loc"></h3>
                <p class="date"></p>
                <p class="temp"></p>
                <p class="icon"></p>
                <p class="cond"></p>
                <p class="wind"></p>
                <p class="precip"></p>
            </article>

            <article class="weather-output" id="weather-present">
                <h3 class="loc"></h3>
                <p class="date"></p>
                <p class="temp"></p>
                <p class="icon"></p>
                <p class="cond"></p>
                <p class="wind"></p>
                <p class="precip"></p>
            </article>

            <article class="weather-output" id="weather-future">
                <h3 class="loc"></h3>
                <p class="date"></p>
                <p class="temp"></p>
                <p class="icon"></p>
                <p class="cond"></p>
                <p class="wind"></p>
                <p class="precip"></p>
            </article>
        </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
